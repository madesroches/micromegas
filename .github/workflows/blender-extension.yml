name: blender-extension

# Build the Micromegas Blender add-on into a single installable extension zip and
# attach it to a GitHub Release. The zip bundles the Python package plus the
# prebuilt micromegas-capi native library for both Linux (.so) and Windows (.dll),
# so each library is compiled on its own native runner and then assembled into one
# archive. Triggered by pushing a tag like `blender-v1.0.0`.
#
# Audience: Blender artists who install the add-on from a zip — no build tools
# required on their machine.

on:
  push:
    tags:
      - 'blender-v*'
  # On-demand build from the Actions UI: produces a downloadable extension zip
  # but does NOT create a GitHub Release (the release job is tag-gated below).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lib:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build native library
        working-directory: rust
        run: cargo build -p micromegas-capi --release

      - uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.os }}
          # Each runner produces exactly one of these; ignore the other.
          path: |
            rust/target/release/libmicromegas_capi.so
            rust/target/release/micromegas_capi.dll
          if-no-files-found: ignore

  package:
    needs: build-lib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Collect both platform libraries into the add-on's lib/ directory.
      - uses: actions/download-artifact@v4
        with:
          pattern: lib-*
          merge-multiple: true
          path: blender/micromegas_blender/lib

      # Each lib is uploaded with if-no-files-found:ignore, so a build that
      # produced nothing would not fail its job. Fail here instead of shipping
      # an extension missing one platform's library.
      - name: Verify both platform libraries are present
        run: |
          test -f blender/micromegas_blender/lib/libmicromegas_capi.so
          test -f blender/micromegas_blender/lib/micromegas_capi.dll

      - name: Package extension zip
        run: python3 build/build_blender_plugin.py --zip-only

      - uses: actions/upload-artifact@v4
        with:
          name: micromegas_blender-extension
          path: blender/micromegas_blender.zip

  release:
    needs: package
    # Only publish a GitHub Release for tag pushes; manual dispatch stops at the
    # uploaded extension artifact.
    if: startsWith(github.ref, 'refs/tags/blender-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: micromegas_blender-extension
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Micromegas Blender add-on ${GITHUB_REF_NAME#blender-v}" \
            --notes "Installable Blender extension zip with the prebuilt micromegas-capi native library for Linux and Windows. Install via Edit > Preferences > Extensions > Install from Disk." \
            dist/micromegas_blender.zip
