name: Analytics Web App

on:
  push:
    branches:
      - main
    paths:
      - 'analytics-web-app/**'
      - 'build/analytics_web_ci.py'
      - '.github/workflows/analytics-web-app.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'analytics-web-app/**'
      - 'build/analytics_web_ci.py'
      - '.github/workflows/analytics-web-app.yml'

jobs:
  check-runner:
    uses: ./.github/workflows/check-runner.yml
    secrets: inherit

  build:
    needs: check-runner
    runs-on: ${{ needs.check-runner.outputs.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js environment
        if: needs.check-runner.outputs.runner == 'ubuntu-latest'
        uses: actions/setup-node@v4
        with:
          node-version-file: 'analytics-web-app/.nvmrc'
          cache: 'yarn'
          cache-dependency-path: 'analytics-web-app/yarn.lock'

      - name: Setup Python
        if: needs.check-runner.outputs.runner == 'ubuntu-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Analytics Web App CI validation
        run: python3 build/analytics_web_ci.py
