name: Build Skip

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'rust/**'
      - 'build/rust_ci.py'
      - 'build/rust_command.py'
      - '.github/workflows/rust.yml'

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - run: echo "No Rust changes, skipping native build"

  wasm:
    runs-on: ubuntu-latest
    steps:
      - run: echo "No Rust changes, skipping WASM build"
