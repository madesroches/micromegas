name: Rust

on:
  push:
    branches: [ "main" ]
    paths:
      - 'rust/**'
      - 'build/rust_ci.py'
      - 'build/rust_command.py'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'rust/**'
      - 'build/rust_ci.py'
      - 'build/rust_command.py'
      - '.github/workflows/rust.yml'
  workflow_dispatch:  # Allow manual runs from the Actions UI

env:
  CARGO_TERM_COLOR: always

jobs:
  check-runner:
    uses: ./.github/workflows/check-runner.yml
    secrets: inherit

  native:
    needs: check-runner
    runs-on: ${{ needs.check-runner.outputs.runner }}
    timeout-minutes: 30
    env:
      # On dev-worker: empty string → unset by shell guard → cargo uses all CPUs.
      # On GitHub-hosted: '2' to avoid OOM during linking on 2-core runners.
      CARGO_BUILD_JOBS: ${{ needs.check-runner.outputs.runner == 'ubuntu-latest' && '2' || '' }}
    steps:
    - uses: actions/checkout@v3

    - name: Show initial disk space
      if: needs.check-runner.outputs.runner == 'ubuntu-latest'
      run: |
        echo "Initial disk space:"
        df -h / | awk 'NR==1 || /\/$/'

    - name: Free up disk space
      if: needs.check-runner.outputs.runner == 'ubuntu-latest'
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /usr/local/.ghcup /usr/share/swift /opt/hostedtoolcache /usr/share/az_* /opt/az /usr/local/share/powershell /usr/share/kotlinc
        sudo apt-get remove -y '^aspnetcore-.*' '^dotnet-.*' '^mongodb-.*' '^mysql-.*' '^php.*' azure-cli google-chrome-stable powershell mono-devel 2>/dev/null || true
        sudo apt-get autoremove -y
        sudo apt-get clean
        docker rmi $(docker images -q) 2>/dev/null || true

    - name: Install mold linker
      if: needs.check-runner.outputs.runner == 'ubuntu-latest'
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y mold

    - name: Install cargo-machete
      if: needs.check-runner.outputs.runner == 'ubuntu-latest'
      run: cargo install cargo-machete

    - name: Run native CI
      run: |
        if [ -z "$CARGO_BUILD_JOBS" ]; then unset CARGO_BUILD_JOBS; fi
        ./build/rust_ci.py native

    - name: Cleanup build artifacts
      if: always() && needs.check-runner.outputs.runner == 'ubuntu-latest'
      run: |
        rm -rf rust/target/debug/deps/*
        rm -rf rust/target/debug/incremental/*

  wasm:
    needs: check-runner
    runs-on: ${{ needs.check-runner.outputs.runner }}
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v3

    - name: Show initial disk space
      if: needs.check-runner.outputs.runner == 'ubuntu-latest'
      run: |
        echo "Initial disk space:"
        df -h / | awk 'NR==1 || /\/$/'

    - name: Free up disk space
      if: needs.check-runner.outputs.runner == 'ubuntu-latest'
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /usr/local/.ghcup /usr/share/swift /opt/hostedtoolcache /usr/share/az_* /opt/az /usr/local/share/powershell /usr/share/kotlinc
        sudo apt-get remove -y '^aspnetcore-.*' '^dotnet-.*' '^mongodb-.*' '^mysql-.*' '^php.*' azure-cli google-chrome-stable powershell mono-devel 2>/dev/null || true
        sudo apt-get autoremove -y
        sudo apt-get clean
        docker rmi $(docker images -q) 2>/dev/null || true

    - name: Install wasm tooling
      if: needs.check-runner.outputs.runner == 'ubuntu-latest'
      run: |
        rustup target add wasm32-unknown-unknown
        cargo install wasm-pack
        WASM_BINDGEN_VERSION=$(python3 -c "import re; t=open('rust/datafusion-wasm/Cargo.lock').read(); m=re.search(r'\[\[package\]\]\s*name\s*=\s*\"wasm-bindgen\"\s*version\s*=\s*\"([^\"]+)\"', t); print(m.group(1))")
        cargo install wasm-bindgen-cli --version "$WASM_BINDGEN_VERSION"

    - name: Install Firefox for headless tests
      # On ubuntu-latest, /usr/bin/firefox is a snap stub and snap may not work in
      # CI, so download Firefox ESR from Mozilla and prepend it to PATH. The tarball
      # ships its own libs but still needs GTK and a few system libraries to load
      # XPCOM. Skipped on dev-worker — the image bakes in Firefox + geckodriver
      # via Mozilla's apt repo.
      if: needs.check-runner.outputs.runner == 'ubuntu-latest'
      run: |
        set -e
        sudo apt-get update -qq
        sudo apt-get install -y libgtk-3-0 libdbus-glib-1-2 libasound2t64 libxt6
        FIREFOX_DIR="$HOME/firefox-bin"
        rm -rf "$FIREFOX_DIR"
        mkdir -p "$FIREFOX_DIR"
        curl -sSL -o /tmp/firefox.tar.xz "https://download.mozilla.org/?product=firefox-esr-latest-ssl&os=linux64&lang=en-US"
        tar -xJf /tmp/firefox.tar.xz -C "$FIREFOX_DIR" --strip-components=1
        rm /tmp/firefox.tar.xz
        echo "$FIREFOX_DIR" >> $GITHUB_PATH
        "$FIREFOX_DIR/firefox" --version

    - name: Run WASM CI
      run: |
        if [ -z "$CARGO_BUILD_JOBS" ]; then unset CARGO_BUILD_JOBS; fi
        if [ -z "$CARGO_TARGET_DIR" ]; then unset CARGO_TARGET_DIR; fi
        ./build/rust_ci.py wasm
      env:
        CARGO_BUILD_JOBS: ${{ needs.check-runner.outputs.runner == 'ubuntu-latest' && '2' || '' }}
        # Override to WASM-specific cache dir on dev-worker (native and WASM targets conflict).
        # On GitHub-hosted this evaluates to '' which the shell guard above unsets.
        CARGO_TARGET_DIR: ${{ needs.check-runner.outputs.runner == 'dev-worker' && '/cache/rust/target-wasm' || '' }}

    - name: Cleanup build artifacts
      if: always() && needs.check-runner.outputs.runner == 'ubuntu-latest'
      run: |
        rm -rf rust/datafusion-wasm/target/*
