name: Web Build Skip

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'analytics-web-app/**'
      - 'build/analytics_web_ci.py'
      - '.github/workflows/analytics-web-app.yml'
      - 'grafana/**'
      - 'typescript/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/grafana-plugin.yml'

jobs:
  check-runner:
    runs-on: ubuntu-latest
    steps:
      - run: echo "No web/grafana changes, skipping check-runner"

  build_analytics_web_app:
    runs-on: ubuntu-latest
    steps:
      - run: echo "No web/grafana changes, skipping build_analytics_web_app"

  grafana_build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "No grafana changes, skipping grafana_build"
