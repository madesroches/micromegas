approvedGitRepositories:
  - "**"

enableGlobalCache: false

enableScripts: true

nodeLinker: node-modules

packageExtensions:
  "@stylistic/eslint-plugin-ts@*":
    peerDependencies:
      typescript: "*"
  "@types/react-virtualized-auto-sizer@*":
    peerDependencies:
      react: "*"
      react-dom: "*"
  "@typescript-eslint/utils@*":
    peerDependencies:
      typescript: "*"
  "tunnel-rat@*":
    peerDependencies:
      react: "*"

# The root .yarnrc.yml is inherited by standalone projects (welcome, doc/*).
# packageExtensions above target grafana workspace deps; yarn 4 warns YN0068
# when they don't match the active tree. Suppress to keep standalone installs clean.
logFilters:
  - code: YN0068
    level: discard
