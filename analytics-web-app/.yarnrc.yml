approvedGitRepositories:
  - "**"

enableGlobalCache: false

enableScripts: true

nodeLinker: node-modules

# Mirrored from root .yarnrc.yml so docker builds (which copy only this file,
# not the monorepo root) still resolve these peers cleanly.
packageExtensions:
  "@typescript-eslint/utils@7.18.0":
    peerDependencies:
      typescript: "*"
  "tunnel-rat@*":
    peerDependencies:
      react: "*"
