[package]
name = "micromegas-telemetry"
description = "structures and functions common to both analytics and ingestion stacks for micromegas"
keywords.workspace = true
version.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
authors.workspace = true

[features]
default = []
server = ["dep:bytes", "dep:futures", "dep:object_store", "dep:sqlx", "dep:url"]

[dependencies]
# Always required
anyhow.workspace = true
chrono.workspace = true
ciborium.workspace = true
lz4.workspace = true
micromegas-transit.workspace = true
serde.workspace = true
uuid.workspace = true

# Server-only
bytes = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
object_store = { workspace = true, optional = true }
sqlx = { workspace = true, optional = true }
url = { workspace = true, optional = true }
