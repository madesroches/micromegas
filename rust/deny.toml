# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Advisory scanning is intentionally handled by `cargo audit`, not here.

[licenses]
# Permissive licenses actually present in the dependency tree. Add a new
# entry (with a one-line justification) only after reviewing the crate.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unlicense",
    "BSL-1.0",
    "0BSD",
    "CC0-1.0",
    "MIT-0",
    "bzip2-1.0.6",
    "CDLA-Permissive-2.0",
    # MPL-2.0: `colored` 3.1.1 (via micromegas-telemetry-sink). Weak,
    # file-level copyleft — no obligations when consumed unmodified as a
    # library dependency, so accepted. Verified `cargo deny check licenses`
    # passes with this entry.
    "MPL-2.0",
]
confidence-threshold = 0.8
# Per-crate license clarifications/exceptions go here if a crate's SPDX
# metadata is missing or wrong:
# [[licenses.exceptions]]
# name = "some-crate"
# allow = ["..."]

[bans]
# Duplicate versions are an error: a new, un-exempted duplicate fails the
# build so it gets a deliberate look. The crates below are the duplicates
# already present in the tree (mostly unavoidable ecosystem splits — the
# `windows-*` API crates mid-migration, the RustCrypto trait crates, and
# transitive `rand`/`getrandom`/`hashbrown` version skew from DataFusion).
# Each is skipped by name, so all of its current versions are accepted;
# a brand-new duplicated crate is not on the list and therefore fails.
# Revisit periodically and drop entries as the tree converges — a stale
# entry surfaces as an `unnecessary-skip` warning.
# This list is the union across both the main workspace and the
# `datafusion-wasm` tree (which shares this config via `--config ../deny.toml`
# and whose duplicates are a subset of the main tree's).
multiple-versions = "deny"
# All internal path/workspace deps carry an explicit version, so any
# remaining wildcard would be a real external `*` requirement — deny it.
wildcards = "deny"
skip = [
    # windows-* API crate family (split across major versions during the
    # ongoing windows-rs ecosystem migration)
    "windows",
    "windows-collections",
    "windows-core",
    "windows-future",
    "windows-implement",
    "windows-link",
    "windows-numerics",
    "windows-result",
    "windows-strings",
    "windows-sys",
    "windows-targets",
    "windows_aarch64_gnullvm",
    "windows_aarch64_msvc",
    "windows_i686_gnu",
    "windows_i686_gnullvm",
    "windows_i686_msvc",
    "windows_x86_64_gnu",
    "windows_x86_64_gnullvm",
    "windows_x86_64_msvc",
    # RustCrypto trait/impl crates (traits split across versions)
    "block-buffer",
    "const-oid",
    "cpufeatures",
    "crypto-common",
    "digest",
    "md-5",
    "sha2",
    # rand / getrandom / hashbrown version skew (DataFusion/Arrow tree)
    "getrandom",
    "hashbrown",
    "rand",
    "rand_chacha",
    "rand_core",
    "r-efi",
    # misc transitive duplicates
    "base64",
    "core-foundation",
    "foldhash",
    "itertools",
    "ordered-float",
    "redox_syscall",
    "thiserror",
    "thiserror-impl",
]

[sources]
# Verified: the tree has no git deps and no non-crates.io registries.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
