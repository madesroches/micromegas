<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Log Cell Mockup 1 — Header Row + Drag Handles</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #e7e9ea; font-family: monospace; font-size: 12px; padding: 16px; }

  h2 { color: #9ca3af; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  .approach { color: #ffb300; font-size: 11px; margin-bottom: 4px; }
  .note { color: #6b7280; font-size: 10px; margin-bottom: 12px; }

  .log-cell { background: #12121a; border: 1px solid #2a2a3e; border-radius: 4px; overflow: hidden; width: 900px; }

  /* ── Header ── */
  .log-header {
    display: flex;
    align-items: stretch;
    background: #1a1a2e;
    border-bottom: 2px solid #2a2a3e;
    user-select: none;
    position: relative;
  }
  .col-header {
    overflow: hidden;
    white-space: nowrap;
    padding: 4px 6px;
    color: #6b7280;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .06em;
    position: relative;
    flex-shrink: 0;
  }
  /* drag handle */
  .col-header::after {
    content: '';
    position: absolute;
    right: 0; top: 20%; bottom: 20%;
    width: 3px;
    background: transparent;
    cursor: col-resize;
    transition: background 0.15s;
    border-radius: 2px;
  }
  .col-header:hover::after,
  .col-header.resizing::after { background: #1565c0; }

  /* ── Rows ── */
  .log-body { overflow-y: auto; max-height: 280px; }
  .log-row {
    display: flex;
    align-items: baseline;
    padding: 1px 8px;
    transition: background .12s;
  }
  .log-row:nth-child(odd)  { background: rgba(26,26,46,.3); }
  .log-row:nth-child(even) { background: transparent; }
  .log-row:hover           { background: rgba(26,26,46,.6); }

  .cell { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding-right: 12px; flex-shrink: 0; }
  .cell-time   { color: #6b7280; }
  .cell-level-info  { color: #1565c0; font-weight: 600; }
  .cell-level-warn  { color: #ffb300; font-weight: 600; }
  .cell-level-error { color: #f87171; font-weight: 600; }
  .cell-level-debug { color: #9ca3af; font-weight: 600; }
  .cell-target { color: #ffb300; }
  .cell-msg    { color: #e7e9ea; }

  /* ── Drag tooltip ── */
  #drag-tooltip {
    position: fixed; display: none;
    background: #1a1a2e; border: 1px solid #1565c0;
    color: #e7e9ea; font-size: 10px;
    padding: 2px 6px; border-radius: 3px;
    pointer-events: none; z-index: 100;
  }

  /* ── Column resize line ── */
  #resize-line {
    position: fixed; display: none;
    width: 1px; background: #1565c0; opacity: .7;
    pointer-events: none; z-index: 99;
    top: 0; bottom: 0;
  }

  .pagination { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-top: 1px solid #2a2a3e; color: #6b7280; font-size: 10px; }
  .pg-btn { background: #1a1a2e; border: 1px solid #2a2a3e; color: #9ca3af; padding: 2px 7px; cursor: pointer; border-radius: 3px; font-size: 10px; }
  .pg-btn:hover { border-color: #1565c0; color: #e7e9ea; }
</style>
</head>
<body>

<div class="approach">Approach 1 — Header row with drag handles between columns</div>
<div class="note">A sticky header row shows column labels. Drag the handle at the right edge of any header cell to resize that column. A blue indicator line tracks the drag.</div>

<div class="log-cell" id="logCell">
  <div class="log-header" id="logHeader">
    <div class="col-header" data-col="time"   style="width:188px">time</div>
    <div class="col-header" data-col="level"  style="width:44px">lvl</div>
    <div class="col-header" data-col="target" style="width:200px">target</div>
    <div class="col-header" data-col="msg"    style="width:420px">msg</div>
  </div>
  <div class="log-body" id="logBody"></div>
  <div class="pagination">
    <button class="pg-btn">«</button>
    <button class="pg-btn">‹</button>
    <span>1 / 4</span>
    <button class="pg-btn">›</button>
    <button class="pg-btn">»</button>
    <span style="margin-left:auto">1–100 of 342</span>
    <select style="background:#1a1a2e;border:1px solid #2a2a3e;color:#9ca3af;padding:2px 4px;font-size:10px;border-radius:3px">
      <option>100</option><option>250</option><option>500</option>
    </select>
  </div>
</div>

<div id="drag-tooltip"></div>
<div id="resize-line"></div>

<script>
// ── Sample data ──────────────────────────────────────────────────────────────
const LEVELS = ['INFO','INFO','INFO','WARN','ERROR','DEBUG','INFO','DEBUG','WARN','INFO'];
const TARGETS = ['engine::render','engine::audio','world::physics','world::ai','net::transport','engine::render','storage::cache','world::physics','engine::audio','net::transport'];
const MSGS = [
  'Frame rendered in 14.2ms, 3 draw calls',
  'Audio buffer underrun — increasing buffer size to 2048',
  'Physics step completed, 128 bodies active',
  'NavMesh rebuild took 84ms, expected <30ms',
  'Connection timeout after 5000ms — retrying (attempt 2/3)',
  'Texture cache hit ratio: 0.94 (2341/2490)',
  'Asset bundle loaded: maps/canyon_01.pak (142 MB)',
  'Broad phase: 1024 collision pairs checked',
  'Audio device latency exceeds threshold: 24ms > 20ms',
  'Heartbeat ACK received from relay 10.0.1.44:9001',
];
const rows = [];
let ts = new Date('2026-06-11T09:14:32.000Z');
for (let i = 0; i < 20; i++) {
  ts = new Date(ts.getTime() + Math.random() * 800 + 100);
  rows.push({ time: ts.toISOString().replace('T',' ').replace('Z',''), level: LEVELS[i%LEVELS.length], target: TARGETS[i%TARGETS.length], msg: MSGS[i%MSGS.length] });
}

// ── Render rows ───────────────────────────────────────────────────────────────
function getWidths() {
  return [...document.querySelectorAll('.col-header')].reduce((m,h) => { m[h.dataset.col] = parseInt(h.style.width); return m; }, {});
}
function renderRows() {
  const w = getWidths();
  const body = document.getElementById('logBody');
  body.innerHTML = rows.map(r => `
    <div class="log-row">
      <div class="cell cell-time"   style="width:${w.time}px"   title="${r.time}">${r.time}</div>
      <div class="cell cell-level-${r.level.toLowerCase()}" style="width:${w.level}px">${r.level}</div>
      <div class="cell cell-target" style="width:${w.target}px" title="${r.target}">${r.target}</div>
      <div class="cell cell-msg"    style="width:${w.msg}px"    title="${r.msg}">${r.msg}</div>
    </div>`).join('');
}
renderRows();

// ── Drag logic ────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('drag-tooltip');
const resizeLine = document.getElementById('resize-line');
let dragging = null; // { header, startX, startW }
const MIN_W = 40;

document.querySelectorAll('.col-header').forEach(header => {
  header.addEventListener('mousedown', e => {
    const rect = header.getBoundingClientRect();
    if (e.clientX < rect.right - 6) return; // only handle zone (rightmost 6px)
    e.preventDefault();
    dragging = { header, startX: e.clientX, startW: parseInt(header.style.width) };
    header.classList.add('resizing');
    resizeLine.style.display = 'block';
    resizeLine.style.left = e.clientX + 'px';
    tooltip.style.display = 'block';
    tooltip.innerText = dragging.startW + 'px';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top  = (e.clientY - 24) + 'px';
  });
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const newW = Math.max(MIN_W, dragging.startW + (e.clientX - dragging.startX));
  dragging.header.style.width = newW + 'px';
  resizeLine.style.left = e.clientX + 'px';
  tooltip.innerText = newW + 'px';
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top  = (e.clientY - 24) + 'px';
  renderRows();
});

document.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging.header.classList.remove('resizing');
  dragging = null;
  resizeLine.style.display = 'none';
  tooltip.style.display = 'none';
});
</script>
</body>
</html>
